name: Deploy Flutter Web

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Web
        run: flutter config --enable-web

      - name: Install dependencies
        run: |
          cd discipl_ai
          flutter pub get

      - name: Build Flutter Web
        run: |
          cd discipl_ai
          flutter build web --release --base-href /Discipl/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: discipl_ai/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4